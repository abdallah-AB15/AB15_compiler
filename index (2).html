<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AB15 — Online Compiler</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 42 42'%3E%3Cpolygon points='21,2 38,11 38,31 21,40 4,31 4,11' fill='none' stroke='%2339ff14' stroke-width='2'/%3E%3Ctext x='6' y='24' font-family='Arial' font-weight='900' font-size='14' fill='%2339ff14'%3EAB%3C/text%3E%3Ctext x='22' y='30' font-family='Arial' font-weight='900' font-size='10' fill='%2339ff14'%3E15%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<style>
:root {
  --mono: 'JetBrains Mono', monospace;
  --disp: 'Syne', sans-serif;
}

/* ═══ THEMES ═══ */
[data-theme="dark"] {
  --bg: #0a0a0a;
  --s1: #111111;
  --s2: #161616;
  --bdr: #222222;
  --acc: #39ff14;
  --a2: #00e5ff;
  --txt: #e8e8e8;
  --dim: #555555;
  --err: #ff4d4d;
  --warn: #ffb347;
  --kw: #39ff14;
  --str: #7ee8a2;
  --num: #ffa657;
  --cmt: #3d3d3d;
  --bi: #c792ea;
  --df: #82aaff;
  --gutter: #0d0d0d;
}
[data-theme="light"] {
  --bg: #fafafa;
  --s1: #f0f0f0;
  --s2: #e8e8e8;
  --bdr: #d0d0d0;
  --acc: #1a8a00;
  --a2: #0057cc;
  --txt: #1a1a1a;
  --dim: #888888;
  --err: #cc2200;
  --warn: #cc7700;
  --kw: #1a8a00;
  --str: #0a6620;
  --num: #aa5500;
  --cmt: #bbbbbb;
  --bi: #7700aa;
  --df: #0057cc;
  --gutter: #eeeeee;
}
[data-theme="midnight"] {
  --bg: #0d1117;
  --s1: #161b22;
  --s2: #1c2128;
  --bdr: #30363d;
  --acc: #3dff70;
  --a2: #79c0ff;
  --txt: #e6edf3;
  --dim: #6e7681;
  --err: #ff7b72;
  --warn: #ffa657;
  --kw: #ff7b72;
  --str: #a5d6ff;
  --num: #ffa657;
  --cmt: #4d5566;
  --bi: #d2a8ff;
  --df: #79c0ff;
  --gutter: #0d1117;
}
[data-theme="forest"] {
  --bg: #0c1a0c;
  --s1: #122012;
  --s2: #172917;
  --bdr: #253525;
  --acc: #56ff2a;
  --a2: #00ffcc;
  --txt: #d0ead0;
  --dim: #507050;
  --err: #ff6666;
  --warn: #ffcc66;
  --kw: #56ff2a;
  --str: #88dd88;
  --num: #ffcc44;
  --cmt: #3a5a3a;
  --bi: #bb88ff;
  --df: #00ffcc;
  --gutter: #0c1a0c;
}
[data-theme="dracula"] {
  --bg: #282a36;
  --s1: #21222c;
  --s2: #2a2c3a;
  --bdr: #44475a;
  --acc: #50fa7b;
  --a2: #8be9fd;
  --txt: #f8f8f2;
  --dim: #6272a4;
  --err: #ff5555;
  --warn: #ffb86c;
  --kw: #ff79c6;
  --str: #f1fa8c;
  --num: #bd93f9;
  --cmt: #6272a4;
  --bi: #8be9fd;
  --df: #50fa7b;
  --gutter: #282a36;
}

/* ═══ RESET ═══ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--txt);
  font-family: var(--mono);
  display: flex;
  flex-direction: column;
  transition: background .25s, color .25s;
}

/* ═══ HEADER ═══ */
header {
  flex-shrink: 0;
  height: 58px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 0;
  background: var(--s1);
  border-bottom: 1px solid var(--bdr);
  transition: background .25s, border-color .25s;
}

/* AB15 Logo */
.ab15-logo {
  display: flex;
  align-items: center;
  gap: 11px;
  flex-shrink: 0;
  margin-right: 20px;
}
.ab15-hex {
  width: 40px;
  height: 40px;
  filter: drop-shadow(0 0 12px color-mix(in srgb, var(--acc) 65%, transparent));
  transition: filter .3s;
}
.ab15-text {
  display: flex;
  flex-direction: column;
  line-height: 1;
}
.ab15-name {
  font-family: var(--disp);
  font-weight: 900;
  font-size: 18px;
  color: var(--acc);
  letter-spacing: -0.5px;
  text-shadow: 0 0 18px color-mix(in srgb, var(--acc) 55%, transparent);
  transition: color .25s, text-shadow .25s;
}
.ab15-tag {
  font-size: 8.5px;
  color: var(--dim);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 2px;
}

/* Divider */
.hdiv {
  width: 1px;
  height: 32px;
  background: var(--bdr);
  margin: 0 18px;
  flex-shrink: 0;
}

/* Language tabs */
.lang-tabs {
  display: flex;
  gap: 6px;
  align-items: center;
}
.ltab {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 16px;
  background: transparent;
  border: 1px solid var(--bdr);
  color: var(--dim);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  transition: all .2s;
  position: relative;
  letter-spacing: .3px;
}
.ltab:hover {
  border-color: color-mix(in srgb, var(--acc) 50%, transparent);
  color: var(--txt);
}
.ltab.on {
  border-color: var(--acc);
  color: var(--acc);
  background: color-mix(in srgb, var(--acc) 7%, transparent);
  box-shadow: 0 0 16px color-mix(in srgb, var(--acc) 20%, transparent);
}
.ltab-logo {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}
.ltab-badge {
  font-size: 9px;
  padding: 1px 6px;
  border: 1px solid currentColor;
  opacity: 0.6;
  letter-spacing: 1px;
}

.spacer { flex: 1; }

/* Themes */
.themes { display: flex; gap: 3px; }
.tbtn {
  padding: 5px 11px;
  font-family: var(--mono);
  font-size: 11px;
  background: transparent;
  border: 1px solid var(--bdr);
  color: var(--dim);
  cursor: pointer;
  transition: all .15s;
}
.tbtn:hover { border-color: var(--acc); color: var(--acc); }
.tbtn.on {
  border-color: var(--acc);
  color: var(--acc);
  background: color-mix(in srgb, var(--acc) 8%, transparent);
}

/* Status */
.stt {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  color: var(--dim);
  margin-left: 14px;
  flex-shrink: 0;
}
.sdot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--dim);
  transition: all .3s;
  flex-shrink: 0;
}
.sdot.ready {
  background: var(--acc);
  box-shadow: 0 0 10px color-mix(in srgb, var(--acc) 65%, transparent);
}
.sdot.spin { background: var(--acc); animation: bl 1s infinite; }
@keyframes bl { 0%,100%{opacity:1} 50%{opacity:.15} }

/* ═══ TOOLBAR ═══ */
.toolbar {
  flex-shrink: 0;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--s2);
  border-bottom: 1px solid var(--bdr);
  transition: background .25s, border-color .25s;
}
.ftab {
  font-size: 12px;
  color: var(--acc);
  border-bottom: 2px solid var(--acc);
  padding-bottom: 3px;
  letter-spacing: .3px;
  transition: color .25s, border-color .25s;
}
.tbr { display: flex; align-items: center; gap: 8px; }
kbd {
  padding: 2px 7px;
  border: 1px solid var(--bdr);
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
  background: var(--s1);
  border-radius: 3px;
}
.hint { font-size: 11px; color: var(--dim); display: flex; align-items: center; gap: 4px; }
.btn {
  padding: 6px 14px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: all .2s;
  letter-spacing: .3px;
}
.btn-run {
  background: var(--acc);
  color: var(--bg);
  clip-path: polygon(0 0, 90% 0, 100% 22%, 100% 100%, 10% 100%, 0 78%);
  padding: 8px 22px;
  box-shadow: 0 0 18px color-mix(in srgb, var(--acc) 38%, transparent);
  font-size: 12px;
}
.btn-run:hover:not(:disabled) { filter: brightness(1.15); transform: translateY(-1px); }
.btn-run:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; transform: none; }
.btn-icon {
  background: transparent;
  color: var(--dim);
  border: 1px solid var(--bdr);
  padding: 6px 10px;
  font-size: 14px;
}
.btn-icon:hover { color: var(--acc); border-color: var(--acc); }
.btn-clr { background: transparent; color: var(--dim); border: 1px solid var(--bdr); }
.btn-clr:hover { color: var(--txt); border-color: var(--dim); }
.si { font-size: 10px; color: var(--dim); display: flex; align-items: center; gap: 4px; transition: color .3s; }
.si.ok { color: var(--acc); }
.si-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

/* ═══ WORKSPACE ═══ */
.ws { flex: 1; display: flex; overflow: hidden; min-height: 0; }
.pane { display: flex; flex-direction: column; overflow: hidden; min-width: 120px; }
.plbl {
  flex-shrink: 0;
  padding: 7px 18px;
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--dim);
  background: var(--s1);
  border-bottom: 1px solid var(--bdr);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background .25s, border-color .25s;
}
.plbl::before {
  content: '';
  width: 5px; height: 5px;
  background: var(--acc);
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0 50%);
  flex-shrink: 0;
  transition: background .25s;
}
.rz {
  flex-shrink: 0;
  width: 4px;
  background: var(--bdr);
  cursor: col-resize;
  position: relative;
  z-index: 10;
  transition: background .2s;
}
.rz:hover, .rz.dr { background: var(--acc); box-shadow: 0 0 8px color-mix(in srgb, var(--acc) 40%, transparent); }
.rz::after { content: '⋮'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: var(--dim); font-size: 12px; pointer-events: none; }
.ew { flex: 1; overflow: hidden; }

/* ═══ CODEMIRROR ═══ */
.CodeMirror {
  height: 100% !important;
  background: var(--bg) !important;
  color: var(--txt) !important;
  font-family: var(--mono) !important;
  font-size: 15px !important;
  line-height: 1.8 !important;
  transition: background .25s, color .25s;
}
.CodeMirror-gutters {
  background: var(--gutter) !important;
  border-right: 1px solid var(--bdr) !important;
  min-width: 54px;
  transition: background .25s, border-color .25s;
}
.CodeMirror-linenumber { color: var(--dim) !important; font-size: 12px !important; padding: 0 10px !important; }
.CodeMirror-cursor { border-left: 2px solid var(--acc) !important; }
.CodeMirror-selected { background: color-mix(in srgb, var(--acc) 10%, transparent) !important; }
.CodeMirror-activeline-background { background: color-mix(in srgb, var(--txt) 3%, transparent) !important; }
.CodeMirror-scroll { padding: 4px 0; }
.cm-keyword  { color: var(--kw)  !important; font-weight: 700; }
.cm-def      { color: var(--df)  !important; }
.cm-string, .cm-string-2 { color: var(--str) !important; }
.cm-number   { color: var(--num) !important; }
.cm-comment  { color: var(--cmt) !important; font-style: italic; }
.cm-builtin  { color: var(--bi)  !important; }
.cm-operator { color: var(--dim) !important; }
.cm-variable, .cm-variable-2 { color: var(--txt) !important; }
.cm-atom     { color: var(--num) !important; }
.cm-property { color: var(--df)  !important; }

/* ═══ TERMINAL ═══ */
.ob {
  flex: 1;
  padding: 14px 20px;
  overflow-y: auto;
  font-size: 14px;
  line-height: 1.85;
  background: var(--bg);
  transition: background .25s;
}
.ob::-webkit-scrollbar { width: 3px; }
.ob::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 2px; }

.ol { display: block; animation: fi .1s ease; }
@keyframes fi { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; transform: translateX(0); } }
.ol.n  { color: var(--txt); }
.ol.e  { color: var(--err); }
.ol.w  { color: var(--warn); }
.ol.s  { color: var(--dim); font-size: 11px; letter-spacing: .8px; }
.ol.ec { color: var(--acc); }
.op    { color: var(--acc); margin-right: 10px; user-select: none; font-weight: 700; }
.op-e  { color: var(--err); margin-right: 10px; user-select: none; font-weight: 700; }

/* Inline input */
.ir {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 0;
  animation: fi .12s ease;
}
.ipt { color: var(--dim); font-size: 14px; flex-shrink: 0; }
.is  { color: var(--acc); font-weight: 700; flex-shrink: 0; }
.ifield {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1.5px solid var(--acc);
  color: var(--acc);
  font-family: var(--mono);
  font-size: 14px;
  outline: none;
  padding: 2px 6px;
  caret-color: var(--acc);
  min-width: 0;
}
.ifield::placeholder { color: color-mix(in srgb, var(--acc) 28%, transparent); font-size: 12px; }
.ien {
  padding: 4px 12px;
  background: var(--acc);
  color: var(--bg);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: filter .15s;
  flex-shrink: 0;
}
.ien:hover { filter: brightness(1.15); }

/* Status bar */
.sbar {
  flex-shrink: 0;
  padding: 7px 18px;
  border-top: 1px solid var(--bdr);
  background: var(--s1);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--dim);
  transition: background .25s, border-color .25s;
}
.tbdg {
  padding: 2px 9px;
  border: 1px solid var(--bdr);
  font-size: 10px;
  color: var(--a2);
  letter-spacing: 1px;
  transition: color .25s, border-color .25s;
}

/* ═══ LOADER ═══ */
.ldr {
  position: fixed; inset: 0;
  background: #090909;
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  transition: opacity .5s;
}
.ldr.gone { opacity: 0; pointer-events: none; }
.ldr-logo {
  font-family: 'Syne', sans-serif;
  font-size: 64px;
  font-weight: 900;
  color: #39ff14;
  letter-spacing: -3px;
  animation: glow 2s ease-in-out infinite;
}
@keyframes glow {
  0%,100% { text-shadow: 0 0 24px #39ff1460, 0 0 50px #39ff1428; }
  50%      { text-shadow: 0 0 44px #39ff1490, 0 0 90px #39ff1455; }
}
.ldr-sub { font-family: var(--mono); font-size: 10px; color: #333; letter-spacing: 4px; text-transform: uppercase; }
.ldr-tr  { width: 220px; height: 2px; background: #1a1a1a; overflow: hidden; }
.ldr-br  { height: 100%; background: #39ff14; width: 0%; transition: width .4s; box-shadow: 0 0 10px #39ff1480; }
.ldr-lb  { font-size: 10px; color: #444; letter-spacing: 2.5px; text-transform: uppercase; }
</style>
</head>
<body data-theme="dark">

<!-- LOADER -->
<div class="ldr" id="ldr">
  <div class="ldr-logo">AB15</div>
  <div class="ldr-sub">Online Compiler</div>
  <div class="ldr-tr"><div class="ldr-br" id="lbar"></div></div>
  <div class="ldr-lb" id="llbl">Initializing Python Engine...</div>
</div>

<!-- HEADER -->
<header>

  <!-- AB15 Logo -->
  <div class="ab15-logo">

  <div class="hdiv"></div>

  <!-- Language Tabs -->
  <div class="lang-tabs">

    <!-- Python Tab -->
    <button class="ltab on" id="tab-py" onclick="switchLang('python',this)">

      Python 3

    <!-- JavaScript Tab -->
    <button class="ltab" id="tab-js" onclick="switchLang('javascript',this)">
      <!-- Real JavaScript Logo SVG -->

        <rect width="630" height="630" fill="#f7df1e" rx="30"/>
        <path d="M165.65,526.474l48.212-29.177c9.3,16.487,17.763,30.425,38.1,30.425c19.453,0,31.71-7.6,31.71-37.2v-201.3h59.2v202.1c0,61.3-35.94,89.2-88.4,89.2c-47.4,0-74.9-24.55-88.8-54.05" fill="#323330"/>
        <path d="M375,520.13l48.2-27.9c12.7,20.72,29.2,35.95,58.4,35.95c24.53,0,40.2-12.26,40.2-29.2c0-20.3-16.1-27.49-43.1-39.3l-14.8-6.35c-42.72-18.2-71.1-41-71.1-89.2c0-44.4,33.83-78.2,86.7-78.2c37.6,0,64.7,13.1,84.2,47.4l-46.1,29.6c-10.15-18.2-21.1-25.37-38.1-25.37c-17.34,0-28.33,11-28.33,25.37c0,17.76,11,24.95,36.4,35.9l14.8,6.34c50.3,21.57,78.7,43.56,78.7,93c0,53.3-41.87,82.5-98.1,82.5c-54.98,0-90.5-26.2-107.88-60.55" fill="#323330"/>
      </svg>
      JavaScript
      <span class="ltab-badge">IN-BROWSER</span>
    </button>

  </div>

  <div class="spacer"></div>

  <!-- Themes -->
  <div class="themes">
    <button class="tbtn on" onclick="setTheme('dark',this)">Dark</button>
    <button class="tbtn" onclick="setTheme('light',this)">Light</button>
    <button class="tbtn" onclick="setTheme('midnight',this)">Midnight</button>
    <button class="tbtn" onclick="setTheme('forest',this)">Forest</button>
    <button class="tbtn" onclick="setTheme('dracula',this)">Dracula</button>
  </div>

  <!-- Status -->
  <div class="stt">
    <div class="sdot spin" id="sdot"></div>
    <span id="slbl">Loading...</span>
  </div>

</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="ftab" id="ftab">main.py</div>
  <div class="tbr">
    <div class="si" id="si"><div class="si-dot"></div><span>Auto-saved</span></div>
    <div class="hint"><kbd>Ctrl</kbd>+<kbd>Enter</kbd>&nbsp;to run</div>
    <button class="btn btn-icon" title="Download code" onclick="dlCode()">⬇</button>
    <button class="btn btn-icon" title="Fullscreen" onclick="toggleFS()">⛶</button>
    <button class="btn btn-clr" onclick="clearOut()">Clear</button>
    <button class="btn btn-run" id="runBtn" onclick="runCode()">▶ Run</button>
  </div>
</div>

<!-- WORKSPACE -->
<div class="ws" id="ws">

  <!-- Editor -->
  <div class="pane" id="ep" style="width:52%">
    <div class="plbl">Editor</div>
    <div class="ew">
      <textarea id="cm"># AB15 Online Compiler 🚀
# Python & JavaScript — 100% in-browser
# No internet needed for execution

name = input("What is your name? ")
print(f"Hello, {name}! 👋")
print()

for day in range(1, 6):
    print(f"  Day {day} of 30 ✅")

print()
print("Keep going! 💪🔥")</textarea>
    </div>
  </div>

  <div class="rz" id="rz"></div>

  <!-- Terminal -->
  <div class="pane" style="flex:1">
    <div class="plbl">Terminal</div>
    <div class="ob" id="out">
      <span class="ol s">// Press Run or Ctrl+Enter to execute your code</span>
    </div>
    <div class="sbar">
      <span id="emsg">Ready</span>
      <span class="tbdg" id="tbdg">—</span>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
<script>
// ════════════════════════════════════
// STARTERS
// ════════════════════════════════════
const STARTERS = {
  python: `# AB15 Online Compiler 🚀
# Python 3 — runs 100% in-browser with full input() support

name = input("What is your name? ")
print(f"Hello, {name}! 👋")
print()

for day in range(1, 6):
    print(f"  Day {day} of 30 ✅")

print()
print("Keep going! 💪🔥")`,

  javascript: `// AB15 Online Compiler 🚀
// JavaScript — runs 100% in-browser

// input() uses browser prompt for JS
function input(prompt) {
    const val = window.prompt(prompt);
    return val !== null ? val : "";
}

const name = input("What is your name? ");
console.log(\`Hello, \${name}! 👋\`);
console.log("");

for (let day = 1; day <= 5; day++) {
    console.log(\`  Day \${day} of 30 ✅\`);
}

console.log("");
console.log("Keep going! 💪🔥");`
};

let lang = 'python';
let pyodide = null;
let editor = null;
let inputResolve = null;
let saveTO = null;

// ── THEME ──
function setTheme(name, btn) {
  document.body.setAttribute('data-theme', name);
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  if (editor) editor.refresh();
  localStorage.setItem('ab15_theme', name);
}

// ── LANG SWITCH ──
function switchLang(newLang, btn) {
  localStorage.setItem('ab15_code_' + lang, editor.getValue());
  lang = newLang;
  document.querySelectorAll('.ltab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  const files = { python: 'main.py', javascript: 'main.js' };
  const modes = { python: 'python', javascript: 'javascript' };
  document.getElementById('ftab').textContent = files[lang];
  editor.setOption('mode', modes[lang]);
  const saved = localStorage.getItem('ab15_code_' + lang);
  editor.setValue(saved || STARTERS[lang]);
  editor.refresh();
  clearOut(false);
  if (lang === 'python') {
    appendLine('// 🐍 Python 3 — in-browser engine, input() fully supported ✅', 's');
  } else {
    appendLine('// 🌐 JavaScript — in-browser engine, console.log() supported ✅', 's');
    appendLine('// input() uses browser prompt dialog', 's');
  }
}

// ── AUTO SAVE ──
function autoSave() {
  const el = document.getElementById('si');
  el.classList.remove('ok');
  clearTimeout(saveTO);
  saveTO = setTimeout(() => {
    localStorage.setItem('ab15_code_' + lang, editor.getValue());
    el.classList.add('ok');
    setTimeout(() => el.classList.remove('ok'), 2200);
  }, 900);
}

// ── DOWNLOAD ──
function dlCode() {
  const files = { python: 'main.py', javascript: 'main.js' };
  const blob = new Blob([editor.getValue()], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = files[lang];
  a.click();
}

// ── FULLSCREEN ──
function toggleFS() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

// ── RESIZER ──
(function () {
  const rz = document.getElementById('rz'), ws = document.getElementById('ws'), ep = document.getElementById('ep');
  let drag = false, sx = 0, sw = 0;
  rz.addEventListener('mousedown', e => {
    drag = true; sx = e.clientX; sw = ep.offsetWidth;
    rz.classList.add('dr'); document.body.style.cssText = 'cursor:col-resize;user-select:none';
  });
  document.addEventListener('mousemove', e => {
    if (!drag) return;
    ep.style.width = Math.min(Math.max(sw + (e.clientX - sx), 180), ws.offsetWidth - 184) + 'px';
    if (editor) editor.refresh();
  });
  document.addEventListener('mouseup', () => {
    if (!drag) return;
    drag = false; rz.classList.remove('dr'); document.body.style.cssText = '';
    if (editor) editor.refresh();
  });
})();

// ── CODEMIRROR ──
editor = CodeMirror.fromTextArea(document.getElementById('cm'), {
  mode: 'python',
  lineNumbers: true,
  autoCloseBrackets: true,
  indentUnit: 4,
  tabSize: 4,
  indentWithTabs: false,
  styleActiveLine: true,
  extraKeys: {
    'Ctrl-Enter': () => runCode(),
    'Tab': cm => cm.replaceSelection('    ')
  }
});
editor.on('change', autoSave);
setTimeout(() => { editor.setSize('100%', '100%'); editor.refresh(); }, 120);

// ── OUTPUT HELPERS ──
function appendLine(text, cls) {
  const out = document.getElementById('out');
  const ir = document.getElementById('_ir');
  if (text === undefined || text === null) return;
  String(text).split('\n').forEach((line, i, arr) => {
    if (i === arr.length - 1 && line === '') return;
    const el = document.createElement('span');
    el.className = 'ol ' + cls;
    if (cls === 'n') {
      el.innerHTML = '<span class="op">›</span>' + esc(line);
    } else if (cls === 'e') {
      el.innerHTML = '<span class="op-e">✕</span>' + esc(line);
    } else {
      el.textContent = line;
    }
    if (ir) out.insertBefore(el, ir); else out.appendChild(el);
  });
  out.scrollTop = out.scrollHeight;
}

function esc(t) {
  return String(t)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function clearOut(hint = true) {
  document.getElementById('_ir')?.remove();
  if (inputResolve) { inputResolve(''); inputResolve = null; }
  document.getElementById('out').innerHTML = '';
  if (hint) appendLine('// Press Run or Ctrl+Enter to execute', 's');
  document.getElementById('emsg').textContent = 'Ready';
  document.getElementById('tbdg').textContent = '—';
}

// ── PYTHON INLINE INPUT ──
function askInput(prompt) {
  return new Promise(resolve => {
    inputResolve = resolve;
    const out = document.getElementById('out');
    document.getElementById('_ir')?.remove();
    const row = document.createElement('div');
    row.className = 'ir'; row.id = '_ir';
    if (prompt) {
      const pt = document.createElement('span');
      pt.className = 'ipt'; pt.textContent = prompt;
      row.appendChild(pt);
    }
    const sym = document.createElement('span');
    sym.className = 'is'; sym.textContent = '›';
    row.appendChild(sym);
    const field = document.createElement('input');
    field.className = 'ifield'; field.type = 'text';
    field.autocomplete = 'off'; field.spellcheck = false;
    field.placeholder = 'Type here and press Enter...';
    row.appendChild(field);
    const btn = document.createElement('button');
    btn.className = 'ien'; btn.textContent = 'ENTER ↵';
    row.appendChild(btn);
    const submit = () => {
      const val = field.value; row.remove();
      const echo = document.createElement('span');
      echo.className = 'ol ec';
      echo.innerHTML = '<span class="op">↳</span>' + esc(prompt || '') + ' <strong>' + esc(val) + '</strong>';
      out.appendChild(echo); out.scrollTop = out.scrollHeight;
      if (inputResolve) { inputResolve(val); inputResolve = null; }
    };
    btn.onclick = submit;
    field.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    out.appendChild(row); out.scrollTop = out.scrollHeight;
    setTimeout(() => field.focus(), 50);
  });
}

// ── PYODIDE ──
window._pyOut = t => appendLine(t, 'n');
window._pyErr = t => { t.split('\n').forEach(l => { if (l.trim()) appendLine(l, 'e'); }); };

async function initPyodide() {
  const bar = document.getElementById('lbar'), lbl = document.getElementById('llbl');
  bar.style.width = '18%'; lbl.textContent = 'Downloading Python 3.11...';
  pyodide = await loadPyodide();
  bar.style.width = '58%'; lbl.textContent = 'Configuring environment...';
  pyodide.runPython(`
import sys

class _Cap:
    def __init__(self, cb): self.cb = cb
    def write(self, s):
        if s:
            from js import window
            getattr(window, self.cb)(s)
    def flush(self): pass

sys.stdout = _Cap('_pyOut')
sys.stderr = _Cap('_pyErr')
  `);
  pyodide.globals.set('_js_input', pyodide.toPy(askInput));
  bar.style.width = '100%'; lbl.textContent = 'Ready!';
  await new Promise(r => setTimeout(r, 350));
  document.getElementById('ldr').classList.add('gone');
  document.getElementById('sdot').className = 'sdot ready';
  document.getElementById('slbl').textContent = 'Ready';

  // Restore theme
  const savedTheme = localStorage.getItem('ab15_theme');
  if (savedTheme) {
    document.body.setAttribute('data-theme', savedTheme);
    document.querySelectorAll('.tbtn').forEach(b => {
      b.classList.toggle('on', b.textContent.toLowerCase() === savedTheme);
    });
  }

  // Restore code
  const savedCode = localStorage.getItem('ab15_code_python');
  if (savedCode) editor.setValue(savedCode);
}

// ── PYTHON WRAPPER ──
function wrapPython(code) {
  const transformed = code.replace(/(?<!await\s)input\s*\(/g, 'await input(');
  const indented = transformed.split('\n').map(l => '    ' + l).join('\n');
  return `import asyncio as _aio

async def _run():
    import builtins
    async def _input(prompt=''):
        import sys
        if prompt:
            sys.stdout.write(str(prompt))
            sys.stdout.flush()
        return await _js_input(str(prompt) if prompt else '')
    builtins.input = _input

${indented}

_aio.get_event_loop().run_until_complete(_run())`;
}

// ── JS RUNNER ──
function runJS(code) {
  const origLog   = console.log;
  const origError = console.error;
  const origWarn  = console.warn;
  const origInfo  = console.info;
  const origPrompt = window.prompt;

  console.log   = (...a) => appendLine(a.map(x => typeof x === 'object' ? JSON.stringify(x, null, 2) : String(x)).join(' '), 'n');
  console.error = (...a) => appendLine(a.map(String).join(' '), 'e');
  console.warn  = (...a) => appendLine(a.map(String).join(' '), 'w');
  console.info  = (...a) => appendLine(a.map(String).join(' '), 'n');

  window.prompt = (msg) => {
    const val = origPrompt ? origPrompt.call(window, msg || '') : '';
    if (val !== null && msg) appendLine(`  ${msg} ${val}`, 'ec');
    return val || '';
  };

  try {
    const fn = new Function(code);
    fn();
  } catch (err) {
    appendLine(err.toString(), 'e');
    if (err.stack) {
      err.stack.split('\n').slice(1, 3).forEach(l => {
        const t = l.trim();
        if (t && !t.includes('Function') && !t.includes('runJS')) appendLine(t, 'e');
      });
    }
  } finally {
    console.log   = origLog;
    console.error = origError;
    console.warn  = origWarn;
    console.info  = origInfo;
    window.prompt = origPrompt;
  }
}

// ── MAIN RUN ──
async function runCode() {
  const btn = document.getElementById('runBtn');
  btn.textContent = '● Running'; btn.disabled = true;
  clearOut(false);
  appendLine(`── Run  ${new Date().toLocaleTimeString()} ─────────────────────────────`, 's');

  const code = editor.getValue().trim();
  if (!code) {
    appendLine('Write some code first!', 'w');
    btn.textContent = '▶ Run'; btn.disabled = false;
    return;
  }

  const t0 = performance.now();

  try {
    if (lang === 'python') {
      if (!pyodide) {
        appendLine('Python engine is still loading, please wait...', 'w');
        btn.textContent = '▶ Run'; btn.disabled = false;
        return;
      }
      await pyodide.runPythonAsync(wrapPython(code));
    } else {
      runJS(code);
    }
  } catch (err) {
    const msg = (err.message || String(err)).split('\n').filter(l => l.trim()).slice(-5).join('\n');
    appendLine(msg, 'e');
  }

  document.getElementById('_ir')?.remove();
  const ms = Math.round(performance.now() - t0);
  appendLine(`── Done  ${ms} ms ──────────────────────────────────`, 's');
  document.getElementById('tbdg').textContent = ms + ' ms';
  document.getElementById('emsg').textContent = 'Execution complete';
  btn.textContent = '▶ Run';
  btn.disabled = false;
}

initPyodide();
</script>
</body>
