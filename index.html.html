<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AB15 — Online Compiler</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/rust/rust.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/shell/shell.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<style>
:root{--mono:'JetBrains Mono',monospace;--disp:'Syne',sans-serif;}
[data-theme="dark"]{--bg:#080808;--s1:#0f0f0f;--s2:#141414;--bdr:#1d1d1d;--acc:#39ff14;--a2:#00e5ff;--txt:#e6e6e6;--dim:#585858;--err:#ff5555;--kw:#39ff14;--str:#7ec8a0;--num:#ffb86c;--cmt:#333;--bi:#bd93f9;--df:#00e5ff;}
[data-theme="light"]{--bg:#f2f2ee;--s1:#e8e8e4;--s2:#dcdcd8;--bdr:#c4c4c0;--acc:#1a7a00;--a2:#0055bb;--txt:#111;--dim:#888;--err:#cc0000;--kw:#1a7a00;--str:#005500;--num:#bb5500;--cmt:#aaa;--bi:#660099;--df:#0055bb;}
[data-theme="midnight"]{--bg:#0d1117;--s1:#161b22;--s2:#1c2128;--bdr:#30363d;--acc:#3dff70;--a2:#58a6ff;--txt:#e6edf3;--dim:#7d8590;--err:#f85149;--kw:#3dff70;--str:#a5d6ff;--num:#f2cc60;--cmt:#4d5566;--bi:#d2a8ff;--df:#58a6ff;}
[data-theme="forest"]{--bg:#0b170b;--s1:#111f11;--s2:#152515;--bdr:#223322;--acc:#50ff20;--a2:#00e5ff;--txt:#cce8cc;--dim:#507050;--err:#ff6b6b;--kw:#50ff20;--str:#90cc90;--num:#ffd700;--cmt:#334433;--bi:#c3a6ff;--df:#00e5ff;}
[data-theme="dracula"]{--bg:#282a36;--s1:#21222c;--s2:#2a2c3a;--bdr:#44475a;--acc:#50fa7b;--a2:#8be9fd;--txt:#f8f8f2;--dim:#6272a4;--err:#ff5555;--kw:#ff79c6;--str:#f1fa8c;--num:#bd93f9;--cmt:#6272a4;--bi:#8be9fd;--df:#50fa7b;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--txt);font-family:var(--mono);display:flex;flex-direction:column;transition:background .22s,color .22s;}
header{flex-shrink:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:8px;background:var(--s1);border-bottom:1px solid var(--bdr);}
.logo-wrap{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.logo-svg{width:36px;height:36px;filter:drop-shadow(0 0 8px color-mix(in srgb,var(--acc) 60%,transparent));}
.logo-name{font-family:var(--disp);font-weight:900;font-size:16px;}
.logo-name em{color:var(--acc);font-style:normal;text-shadow:0 0 14px color-mix(in srgb,var(--acc) 45%,transparent);}
.lang-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.lang-lbl{font-size:10px;color:var(--dim);letter-spacing:1.5px;}
.lang-sel{background:var(--s2);border:1px solid var(--bdr);color:var(--acc);font-family:var(--mono);font-size:12px;padding:4px 10px;cursor:pointer;outline:none;}
.lang-sel option{background:var(--s2);color:var(--txt);}
.themes{display:flex;gap:4px;}
.tbtn{padding:3px 9px;font-family:var(--mono);font-size:11px;background:transparent;border:1px solid var(--bdr);color:var(--dim);cursor:pointer;transition:all .18s;}
.tbtn:hover,.tbtn.on{border-color:var(--acc);color:var(--acc);}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.py-pill{padding:3px 8px;border:1px solid var(--bdr);font-size:10px;color:var(--acc);letter-spacing:1px;}
.stt{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dim);}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--dim);}
.sdot.ready{background:var(--acc);box-shadow:0 0 8px color-mix(in srgb,var(--acc) 55%,transparent);}
.sdot.spin{background:var(--acc);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.toolbar{flex-shrink:0;height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--s2);border-bottom:1px solid var(--bdr);}
.ftab{font-size:12px;color:var(--acc);border-bottom:2px solid var(--acc);padding-bottom:2px;}
.tbar-r{display:flex;align-items:center;gap:7px;}
kbd{padding:2px 5px;border:1px solid var(--bdr);font-family:var(--mono);font-size:10px;color:var(--dim);background:var(--s1);}
.hint{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:4px;}
.btn{padding:6px 13px;font-family:var(--mono);font-size:11px;font-weight:600;cursor:pointer;border:none;letter-spacing:.4px;transition:all .2s;}
.btn-run{background:var(--acc);color:var(--bg);clip-path:polygon(0 0,91% 0,100% 24%,100% 100%,9% 100%,0 76%);padding:7px 18px;box-shadow:0 0 12px color-mix(in srgb,var(--acc) 30%,transparent);}
.btn-run:hover:not(:disabled){filter:brightness(1.2);transform:translateY(-1px);}
.btn-run:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;}
.btn-icon{background:transparent;color:var(--dim);border:1px solid var(--bdr);padding:5px 9px;font-size:14px;}
.btn-icon:hover{color:var(--acc);border-color:var(--acc);}
.btn-clear{background:transparent;color:var(--dim);border:1px solid var(--bdr);}
.btn-clear:hover{color:var(--txt);}
.save-ind{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:4px;}
.save-ind.saved{color:var(--acc);}
.save-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.workspace{flex:1;display:flex;overflow:hidden;min-height:0;}
.pane{display:flex;flex-direction:column;overflow:hidden;min-width:140px;}
.pane-lbl{flex-shrink:0;padding:6px 16px;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);background:var(--s1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:7px;}
.pane-lbl::before{content:'';width:5px;height:5px;background:var(--acc);clip-path:polygon(50% 0%,100% 50%,50% 100%,0 50%);}
.resizer{flex-shrink:0;width:5px;background:var(--bdr);cursor:col-resize;position:relative;z-index:10;transition:background .18s;}
.resizer:hover,.resizer.drag{background:var(--acc);}
.resizer::after{content:'⋮';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--dim);font-size:13px;pointer-events:none;}
.editor-wrap{flex:1;overflow:hidden;}
.CodeMirror{height:100% !important;background:var(--bg) !important;color:var(--txt) !important;font-family:var(--mono) !important;font-size:15px !important;line-height:1.75 !important;}
.CodeMirror-gutters{background:var(--s1) !important;border-right:1px solid var(--bdr) !important;min-width:52px;}
.CodeMirror-linenumber{color:var(--dim) !important;font-size:13px !important;padding:0 8px !important;}
.CodeMirror-cursor{border-left:2px solid var(--acc) !important;}
.CodeMirror-selected{background:rgba(57,255,20,.07) !important;}
.CodeMirror-activeline-background{background:rgba(255,255,255,.02) !important;}
.cm-keyword{color:var(--kw) !important;font-weight:600;}
.cm-def{color:var(--df) !important;}
.cm-string{color:var(--str) !important;}
.cm-number{color:var(--num) !important;}
.cm-comment{color:var(--cmt) !important;font-style:italic;}
.cm-builtin{color:var(--bi) !important;}
.cm-operator{color:var(--dim) !important;}
.out-body{flex:1;padding:12px 18px;overflow-y:auto;font-size:14px;line-height:1.85;}
.out-body::-webkit-scrollbar{width:3px;}
.out-body::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px;}
.out-line{display:block;animation:si .1s ease;}
@keyframes si{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:translateX(0)}}
.out-line.n{color:var(--txt);}
.out-line.e{color:var(--err);}
.out-line.s{color:var(--dim);font-size:11px;letter-spacing:1px;}
.out-line.echo{color:var(--acc);}
.op{color:var(--acc);margin-right:9px;user-select:none;font-weight:700;}
.inp-row{display:flex;align-items:center;gap:6px;margin:2px 0;animation:si .12s ease;}
.inp-prompt-txt{color:var(--dim);font-size:14px;flex-shrink:0;}
.inp-sym{color:var(--acc);font-weight:700;flex-shrink:0;}
.inp-field{flex:1;background:transparent;border:none;border-bottom:1.5px solid var(--acc);color:var(--acc);font-family:var(--mono);font-size:14px;outline:none;padding:1px 4px;caret-color:var(--acc);min-width:0;}
.inp-field::placeholder{color:color-mix(in srgb,var(--acc) 35%,transparent);font-size:13px;}
.inp-enter{padding:2px 10px;background:var(--acc);color:var(--bg);font-family:var(--mono);font-size:11px;font-weight:700;border:none;cursor:pointer;}
.sbar{flex-shrink:0;padding:6px 16px;border-top:1px solid var(--bdr);background:var(--s1);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--dim);}
.tbadge{padding:2px 8px;border:1px solid var(--bdr);font-size:10px;color:var(--a2);letter-spacing:1px;}
.loader{position:fixed;inset:0;background:#080808;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s;}
.loader.gone{opacity:0;pointer-events:none;}
.ldr-logo{font-family:var(--disp);font-size:56px;font-weight:900;color:#39ff14;letter-spacing:-3px;text-shadow:0 0 30px #39ff1460;animation:gp 2s ease-in-out infinite;}
@keyframes gp{0%,100%{text-shadow:0 0 24px #39ff1460,0 0 50px #39ff1428;}50%{text-shadow:0 0 40px #39ff1490,0 0 80px #39ff1450;}}
.ldr-sub{font-family:var(--mono);font-size:10px;letter-spacing:4px;color:#333;text-transform:uppercase;}
.ldr-track{width:200px;height:2px;background:#1a1a1a;overflow:hidden;}
.ldr-bar{height:100%;background:#39ff14;width:0%;transition:width .35s;box-shadow:0 0 8px #39ff1480;}
.ldr-lbl{font-size:10px;color:#404040;letter-spacing:2.5px;text-transform:uppercase;}
</style>
</head>
<body data-theme="dark">

<div class="loader" id="loader">
  <div class="ldr-logo">AB15</div>
  <div class="ldr-sub">Online Compiler</div>
  <div class="ldr-track"><div class="ldr-bar" id="lbar"></div></div>
  <div class="ldr-lbl" id="llbl">Initializing...</div>
</div>

<header>
  <div class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 42 42" fill="none">
      <polygon points="21,2 38,11 38,31 21,40 4,31 4,11" fill="none" stroke="var(--acc)" stroke-width="1.5" stroke-linejoin="round" opacity="0.6"/>
      <line x1="4" y1="11" x2="21" y2="21" stroke="var(--acc)" stroke-width="1" opacity="0.3"/>
      <line x1="38" y1="11" x2="21" y2="21" stroke="var(--acc)" stroke-width="1" opacity="0.3"/>
      <line x1="21" y1="40" x2="21" y2="21" stroke="var(--acc)" stroke-width="1" opacity="0.3"/>
      <text x="7" y="22" font-family="Syne,sans-serif" font-weight="900" font-size="12" fill="var(--acc)" letter-spacing="-0.5">AB</text>
      <text x="22" y="28" font-family="Syne,sans-serif" font-weight="900" font-size="10" fill="var(--acc)" opacity="0.7">15</text>
      <circle cx="21" cy="21" r="1.5" fill="var(--acc)"/>
    </svg>
    <div class="logo-name"><em>AB15</em> Compiler</div>
  </div>

  <div class="lang-wrap">
    <span class="lang-lbl">LANG</span>
    <select class="lang-sel" id="langSel" onchange="onLangChange()">
      <option value="python">Python 3</option>
      <option value="javascript">JavaScript</option>
      <option value="c">C</option>
      <option value="cpp">C++</option>
      <option value="java">Java</option>
      <option value="rust">Rust</option>
      <option value="go">Go</option>
      <option value="php">PHP</option>
      <option value="ruby">Ruby</option>
      <option value="swift">Swift</option>
      <option value="kotlin">Kotlin</option>
      <option value="typescript">TypeScript</option>
      <option value="bash">Bash</option>
      <option value="r">R</option>
      <option value="csharp">C#</option>
    </select>
  </div>

  <div class="themes">
    <button class="tbtn on" onclick="setTheme('dark',this)">Dark</button>
    <button class="tbtn" onclick="setTheme('light',this)">Light</button>
    <button class="tbtn" onclick="setTheme('midnight',this)">Midnight</button>
    <button class="tbtn" onclick="setTheme('forest',this)">Forest</button>
    <button class="tbtn" onclick="setTheme('dracula',this)">Dracula</button>
  </div>

  <div class="header-right">
    <div class="py-pill" id="langPill">PYTHON 3</div>
    <div class="stt">
      <div class="sdot spin" id="sdot"></div>
      <span id="slbl">Loading...</span>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="ftab" id="fileTab">main.py</div>
  <div class="tbar-r">
    <div class="save-ind" id="saveInd"><div class="save-dot"></div><span>Saved</span></div>
    <div class="hint"><kbd>Ctrl</kbd>+<kbd>Enter</kbd></div>
    <button class="btn btn-icon" title="Download" onclick="downloadCode()">&#8659;</button>
    <button class="btn btn-icon" title="Fullscreen" onclick="toggleFS()">&#9974;</button>
    <button class="btn btn-clear" onclick="clearOutput()">Clear</button>
    <button class="btn btn-run" id="runBtn" onclick="runCode()">&#9654; Run</button>
  </div>
</div>

<div class="workspace" id="ws">
  <div class="pane" id="ep" style="width:50%">
    <div class="pane-lbl">Editor</div>
    <div class="editor-wrap">
      <textarea id="cm"># AB15 Compiler - 15 Languages! 🚀
# Python runs in-browser. Others use Piston API.

name = input("What is your name? ")
print(f"Hello, {name}! 👋")
print()

for day in range(1, 6):
    print(f"  Day {day} of 30 ✅")

print("\nKeep going! 💪🔥")</textarea>
    </div>
  </div>
  <div class="resizer" id="rz"></div>
  <div class="pane" id="op" style="flex:1">
    <div class="pane-lbl">Terminal</div>
    <div class="out-body" id="out">
      <span class="out-line s">// Select a language, write code, press Run</span>
    </div>
    <div class="sbar">
      <span id="emsg">Ready</span>
      <span class="tbadge" id="tbdg">-</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
<script>
const LANGS={
  python:{name:'Python 3',pill:'PYTHON 3',file:'main.py',cm:'python',piston:'python',version:'3.10.0',starter:'# Python 3\nname = input("Your name? ")\nprint(f"Hello, {name}! 🚀")'},
  javascript:{name:'JavaScript',pill:'JS',file:'main.js',cm:'javascript',piston:'javascript',version:'18.15.0',starter:'// JavaScript\nconst name = "AB15";\nconsole.log(`Hello, ${name}! 🚀`);\nfor(let i=1;i<=5;i++) console.log(`Day ${i} ✅`);'},
  c:{name:'C',pill:'C',file:'main.c',cm:'text/x-csrc',piston:'c',version:'10.2.0',starter:'#include <stdio.h>\nint main() {\n    printf("Hello from C!\\n");\n    return 0;\n}'},
  cpp:{name:'C++',pill:'C++',file:'main.cpp',cm:'text/x-c++src',piston:'c++',version:'10.2.0',starter:'#include <iostream>\nusing namespace std;\nint main() {\n    cout << "Hello from C++!" << endl;\n    return 0;\n}'},
  java:{name:'Java',pill:'JAVA',file:'Main.java',cm:'text/x-java',piston:'java',version:'15.0.2',starter:'public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello from Java!");\n    }\n}'},
  rust:{name:'Rust',pill:'RUST',file:'main.rs',cm:'rust',piston:'rust',version:'1.50.0',starter:'fn main() {\n    println!("Hello from Rust! 🦀");\n}'},
  go:{name:'Go',pill:'GO',file:'main.go',cm:'text/x-go',piston:'go',version:'1.16.2',starter:'package main\nimport "fmt"\nfunc main() {\n    fmt.Println("Hello from Go!")\n}'},
  php:{name:'PHP',pill:'PHP',file:'main.php',cm:'application/x-httpd-php',piston:'php',version:'8.0.2',starter:'<?php\necho "Hello from PHP!\\n";\n?>'},
  ruby:{name:'Ruby',pill:'RUBY',file:'main.rb',cm:'text/x-ruby',piston:'ruby',version:'3.0.1',starter:'puts "Hello from Ruby! 💎"'},
  swift:{name:'Swift',pill:'SWIFT',file:'main.swift',cm:'text/x-swift',piston:'swift',version:'5.3.3',starter:'print("Hello from Swift! 🍎")'},
  kotlin:{name:'Kotlin',pill:'KOTLIN',file:'main.kt',cm:'text/x-kotlin',piston:'kotlin',version:'1.4.31',starter:'fun main() {\n    println("Hello from Kotlin!")\n}'},
  typescript:{name:'TypeScript',pill:'TS',file:'main.ts',cm:'text/typescript',piston:'typescript',version:'4.2.3',starter:'const msg: string = "Hello from TypeScript!";\nconsole.log(msg);'},
  bash:{name:'Bash',pill:'BASH',file:'main.sh',cm:'shell',piston:'bash',version:'5.1.0',starter:'#!/bin/bash\necho "Hello from Bash! 🐧"\nfor i in 1 2 3 4 5; do\n  echo "Day $i of 30 ✅"\ndone'},
  r:{name:'R',pill:'R',file:'main.r',cm:'text/x-rsrc',piston:'r',version:'4.1.1',starter:'cat("Hello from R!\\n")\nfor(i in 1:5) cat(paste("Day",i,"of 30 ✅\\n"))'},
  csharp:{name:'C#',pill:'C#',file:'main.cs',cm:'text/x-csharp',piston:'csharp',version:'6.12.0',starter:'using System;\nclass Program {\n    static void Main() {\n        Console.WriteLine("Hello from C#!");\n    }\n}'}
};

let currentLang='python',pyodide=null,editor=null,inputResolve=null,saveTO=null;

function setTheme(name,btn){
  document.body.setAttribute('data-theme',name);
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(editor)editor.refresh();
  localStorage.setItem('ab15_theme',name);
}

function onLangChange(){
  const lang=document.getElementById('langSel').value;
  currentLang=lang;
  const cfg=LANGS[lang];
  document.getElementById('langPill').textContent=cfg.pill;
  document.getElementById('fileTab').textContent=cfg.file;
  const saved=localStorage.getItem('ab15_code_'+lang);
  editor.setValue(saved||cfg.starter);
  editor.setOption('mode',cfg.cm);
  editor.refresh();
  clearOutput();
  if(lang!=='python'){
    document.getElementById('sdot').className='sdot ready';
    document.getElementById('slbl').textContent='Ready (API)';
  } else if(pyodide){
    document.getElementById('sdot').className='sdot ready';
    document.getElementById('slbl').textContent='Ready';
  }
}

function autoSave(){
  const ind=document.getElementById('saveInd');
  ind.classList.remove('saved');
  clearTimeout(saveTO);
  saveTO=setTimeout(()=>{
    localStorage.setItem('ab15_code_'+currentLang,editor.getValue());
    ind.classList.add('saved');
    setTimeout(()=>ind.classList.remove('saved'),2000);
  },800);
}

function downloadCode(){
  const cfg=LANGS[currentLang];
  const blob=new Blob([editor.getValue()],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=cfg.file;
  a.click();
}

function toggleFS(){
  if(!document.fullscreenElement)document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

(function(){
  const rz=document.getElementById('rz'),ws=document.getElementById('ws'),ep=document.getElementById('ep');
  let drag=false,sx=0,sw=0;
  rz.addEventListener('mousedown',e=>{drag=true;sx=e.clientX;sw=ep.offsetWidth;rz.classList.add('drag');document.body.style.cssText='cursor:col-resize;user-select:none';});
  document.addEventListener('mousemove',e=>{if(!drag)return;const max=ws.offsetWidth-rz.offsetWidth;ep.style.width=Math.min(Math.max(sw+(e.clientX-sx),160),max-160)+'px';if(editor)editor.refresh();});
  document.addEventListener('mouseup',()=>{if(!drag)return;drag=false;rz.classList.remove('drag');document.body.style.cssText='';if(editor)editor.refresh();});
})();

editor=CodeMirror.fromTextArea(document.getElementById('cm'),{
  mode:'python',lineNumbers:true,autoCloseBrackets:true,
  indentUnit:4,tabSize:4,indentWithTabs:false,styleActiveLine:true,
  extraKeys:{'Ctrl-Enter':()=>runCode(),'Tab':cm=>cm.replaceSelection('    ')}
});
editor.on('change',autoSave);
setTimeout(()=>{editor.setSize('100%','100%');editor.refresh();},100);

function askInput(prompt){
  return new Promise(resolve=>{
    inputResolve=resolve;
    const out=document.getElementById('out');
    document.getElementById('ir')?.remove();
    const row=document.createElement('div');
    row.className='inp-row';row.id='ir';
    if(prompt){const pt=document.createElement('span');pt.className='inp-prompt-txt';pt.textContent=prompt;row.appendChild(pt);}
    const sym=document.createElement('span');sym.className='inp-sym';sym.textContent='>';row.appendChild(sym);
    const field=document.createElement('input');field.className='inp-field';field.type='text';field.autocomplete='off';field.spellcheck=false;field.placeholder='Type and press Enter...';row.appendChild(field);
    const btn=document.createElement('button');btn.className='inp-enter';btn.textContent='ENTER';row.appendChild(btn);
    const submit=()=>{
      const val=field.value;row.remove();
      const echo=document.createElement('span');echo.className='out-line echo';
      echo.innerHTML='<span class="op">></span>'+esc(prompt||'')+' <b>'+esc(val)+'</b>';
      out.appendChild(echo);out.scrollTop=out.scrollHeight;
      if(inputResolve){inputResolve(val);inputResolve=null;}
    };
    btn.onclick=submit;field.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
    out.appendChild(row);out.scrollTop=out.scrollHeight;
    setTimeout(()=>field.focus(),40);
  });
}

function appendLine(text,cls){
  const out=document.getElementById('out');
  const ir=document.getElementById('ir');
  if(!text&&cls!=='s')return;
  text.split('\n').forEach((line,i,arr)=>{
    if(i===arr.length-1&&line==='')return;
    const el=document.createElement('span');el.className='out-line '+cls;
    if(cls==='n')el.innerHTML='<span class="op">></span>'+esc(line);
    else if(cls==='e')el.innerHTML='<span class="op" style="color:var(--err)">X</span>'+esc(line);
    else el.textContent=line;
    if(ir)out.insertBefore(el,ir);else out.appendChild(el);
  });
  out.scrollTop=out.scrollHeight;
}

function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function clearOutput(hint=true){
  document.getElementById('ir')?.remove();
  if(inputResolve){inputResolve('');inputResolve=null;}
  document.getElementById('out').innerHTML='';
  if(hint)appendLine('// Press Run or Ctrl+Enter to execute','s');
  document.getElementById('emsg').textContent='Ready';
  document.getElementById('tbdg').textContent='-';
}

window._pyOut=t=>appendLine(t,'n');
window._pyErr=t=>{t.split('\n').forEach(l=>{if(l.trim())appendLine(l,'e');});};

async function initPyodide(){
  const bar=document.getElementById('lbar'),lbl=document.getElementById('llbl');
  bar.style.width='20%';lbl.textContent='Downloading Python 3.11...';
  pyodide=await loadPyodide();
  bar.style.width='60%';lbl.textContent='Configuring...';
  pyodide.runPython(`
import sys
class _Cap:
    def __init__(self,cb): self.cb=cb
    def write(self,s):
        if s:
            from js import window
            getattr(window,self.cb)(s)
    def flush(self): pass
sys.stdout=_Cap('_pyOut')
sys.stderr=_Cap('_pyErr')
  `);
  pyodide.globals.set('_js_input',pyodide.toPy(askInput));
  bar.style.width='100%';lbl.textContent='Ready!';
  await new Promise(r=>setTimeout(r,350));
  document.getElementById('loader').classList.add('gone');
  document.getElementById('sdot').className='sdot ready';
  document.getElementById('slbl').textContent='Ready';
  const savedTheme=localStorage.getItem('ab15_theme');
  if(savedTheme){
    document.body.setAttribute('data-theme',savedTheme);
    document.querySelectorAll('.tbtn').forEach(b=>{b.classList.toggle('on',b.textContent.toLowerCase()===savedTheme);});
  }
  const savedCode=localStorage.getItem('ab15_code_python');
  if(savedCode)editor.setValue(savedCode);
}

function transformCode(code){return code.replace(/(?<!await\s)input\s*\(/g,'await input(');}

function wrapPython(code){
  const ind=transformCode(code).split('\n').map(l=>'    '+l).join('\n');
  return `
import asyncio as _aio
async def _run():
    import builtins
    async def _input(prompt=''):
        import sys
        if prompt:
            sys.stdout.write(str(prompt)); sys.stdout.flush()
        return await _js_input(str(prompt) if prompt else '')
    builtins.input = _input
${ind}
_aio.get_event_loop().run_until_complete(_run())
`;}

function runJS(code){
  const ol=console.log,oe=console.error;
  console.log=(...a)=>appendLine(a.map(String).join(' '),'n');
  console.error=(...a)=>appendLine(a.map(String).join(' '),'e');
  try{eval(code);}catch(err){appendLine(String(err),'e');}
  finally{console.log=ol;console.error=oe;}
}

async function runWithPiston(lang,code){
  const cfg=LANGS[lang];
  appendLine('Connecting to Piston API...','s');
  try{
    const res=await fetch('https://emkc.org/api/v2/piston/execute',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({language:cfg.piston,version:cfg.version,files:[{name:cfg.file,content:code}]})
    });
    if(!res.ok)throw new Error('API error: '+res.status);
    const data=await res.json();
    if(data.compile&&data.compile.stderr){data.compile.stderr.split('\n').forEach(l=>{if(l.trim())appendLine(l,'e');});}
    if(data.run&&data.run.stdout){data.run.stdout.split('\n').forEach(l=>{if(l!=='')appendLine(l,'n');});}
    if(data.run&&data.run.stderr){data.run.stderr.split('\n').forEach(l=>{if(l.trim())appendLine(l,'e');});}
  }catch(err){
    appendLine('Error: '+err.message,'e');
    appendLine('Note: Internet required for non-Python languages.','s');
  }
}

async function runCode(){
  const btn=document.getElementById('runBtn');
  btn.textContent='Running';btn.disabled=true;
  clearOutput(false);
  appendLine('-- Run  '+new Date().toLocaleTimeString()+' ---------------------------','s');
  const code=editor.getValue(),t0=performance.now();
  try{
    if(currentLang==='python'){
      if(!pyodide){appendLine('Python engine loading...','e');return;}
      await pyodide.runPythonAsync(wrapPython(code));
    }else if(currentLang==='javascript'){
      runJS(code);
    }else{
      await runWithPiston(currentLang,code);
    }
  }catch(err){
    appendLine((err.message||String(err)).split('\n').filter(l=>l.trim()).slice(-5).join('\n'),'e');
  }
  document.getElementById('ir')?.remove();
  const ms=Math.round(performance.now()-t0);
  appendLine('-- Done  '+ms+' ms ----------------------------------','s');
  document.getElementById('tbdg').textContent=ms+' ms';
  document.getElementById('emsg').textContent='Done';
  btn.textContent='Run';btn.disabled=false;
}

initPyodide();
</script>
